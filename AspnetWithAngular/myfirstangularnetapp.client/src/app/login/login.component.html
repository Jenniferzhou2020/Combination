<div class="container py-5" style="max-width: 420px;">
  <h3 class="mb-4 text-center">Sign in</h3>
  <div *ngIf="vm.error()" class="alert alert-danger">{{ vm.error() }}</div>
  <div>{{ vm.msg }}</div>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" >
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input name="email"
             type="email"
             formControlName="email"
             class="form-control"
             autocomplete="username" />
      <div class="error" *ngIf="form.get('email')?.touched && form.get('email')?.errors?.['email']">
        Enter a valid email
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input name="password"
             type="password"
             class="form-control"
             formControlName="password"
             autocomplete="current-password" />
      <div class="error" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['password']">
        Enter password
      </div>
    </div>

    <button type="submit" [disabled]="form.invalid">Login</button>

    <div class="mt-3 text-center">
      <a routerLink="/forgot-password" class="small">Forgot password?</a>
    </div>
  </form>
</div>
